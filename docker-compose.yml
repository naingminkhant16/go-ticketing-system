services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_PORT: ${APP_PORT:-8080}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-ticketing}
      DB_PASSWORD: ${DB_PASSWORD:-ticketing}
      DB_NAME: ${DB_NAME:-ticketing_system}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_MAIL_ADDRESS: ${SMTP_FROM_MAIL_ADDRESS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      EMAIL_VERIFY_URL: ${EMAIL_VERIFY_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ticketing_system}
      POSTGRES_USER: ${DB_USERNAME:-ticketing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ticketing}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ticketing} -d ${DB_NAME:-ticketing_system}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
